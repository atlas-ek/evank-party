<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Evan's Birthday</title>
  <meta property="og:title" content="Evan's Birthday 🎉">
  <meta property="og:description" content="The party is over. See you next year!">
  <meta property="og:image" content="https://evank.party/preview.jpg">
  <meta property="og:url" content="https://evank.party">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; height: 100%; }
    :root { --bg: #0a0a0a; --white: #e8e8e8; --grey: #666; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--white);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      animation: fadeUp 0.6s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .title {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 6px;
      margin-bottom: 20px;
    }
    .message {
      font-size: 14px;
      color: var(--grey);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🎉</div>
    <div class="message">The party is over.<br>See you next year!</div>
  </div>
</body>
</html>
